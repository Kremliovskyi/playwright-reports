<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playwright Report Viewer</title>
    <!-- Modern Typography: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="app-container">
      <!-- Sidebar or Header Space -->
      <header class="header">
        <div class="header-content">
          <div class="logo">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-test-tube-diagonal"
            >
              <path
                d="M21 7 6.82 21.18a2.83 2.83 0 0 1-3.99-.01v0a2.83 2.83 0 0 1 0-4L17 3"
              />
              <path d="m16 2 6 6" />
              <path d="M12 16H4" />
            </svg>
            <h1>Test Reports Central</h1>
          </div>
          <div class="actions">
            <button id="refresh-btn" class="btn primary-btn">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
                class="lucide lucide-rotate-cw"
              >
                <path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8" />
                <path d="M21 3v5h-5" />
              </svg>
              Refresh
            </button>
          </div>
        </div>
      </header>

      <!-- Main Content Area -->
      <main class="main-content">
        <section class="reports-section">
          <div class="section-header">
            <h2>Available Reports</h2>
            <p class="subtitle">
              Select a test run to view the detailed Playwright HTML report and
              traces.
            </p>
          </div>

          <!-- Table container for Reports -->
          <div class="table-container">
            <table class="reports-table hidden" id="reports-table">
              <thead>
                <tr>
                  <th>Date Created</th>
                  <th>Report Origin</th>
                  <th>Action</th>
                </tr>
              </thead>
              <tbody id="reports-tbody">
                <!-- Reports injected here -->
              </tbody>
            </table>

            <div id="loading" class="loading-state">
              <div class="spinner"></div>
              <p>Loading reports...</p>
            </div>
          </div>

          <div id="empty-state" class="empty-state hidden">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="48"
              height="48"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
              class="lucide lucide-inbox"
            >
              <polyline points="22 12 16 12 14 15 10 15 8 12 2 12" />
              <path
                d="M5.45 5.11 2 12v6a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-6l-3.45-6.89A2 2 0 0 0 16.76 4H7.24a2 2 0 0 0-1.79 1.11z"
              />
            </svg>
            <h3>No reports found</h3>
            <p>
              Make sure you have Playwright HTML report folders inside the
              <code>reports</code> directory.
            </p>
          </div>
        </section>
      </main>
    </div>

    <script src="app.js"></script>
  </body>
</html>
